<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamer's Entertainment Hub</title>
        <link rel="icon" href="favicon.ico">
        <link rel="stylesheet" href="styles/main.css">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Roboto:wght@300;400&display=swap"
        rel="stylesheet">
</head>

<body>

    <header>
        <div class="logo">
            🎮🎬 Gamer's Entertainment Hub
        </div>

        <nav>
            <a href="#">Home</a>
            <a href="#">Favorites</a>
        </nav>

        <button id="theme-toggle">
            Theme
        </button>
    </header>

    <main>

        <section class="search-section">
            <input type="text" placeholder="Search games, movies, TV shows...">
        </section>

        <section>
            <h2>Trending Games</h2>

            <div class="card-container">
                <div class="card">Game Card</div>
                <div class="card">Game Card</div>
                <div class="card">Game Card</div>
                <div class="card">Game Card</div>
            </div>
        </section>

        <section>
            <h2>Trending Movies</h2>

            <div class="card-container">
                <div class="card">Movie Card</div>
                <div class="card">Movie Card</div>
                <div class="card">Movie Card</div>
                <div class="card">Movie Card</div>
            </div>
        </section>

        <section>
            <h2>Trending TV Shows</h2>

            <div class="card-container">
                <div class="card">TV Card</div>
                <div class="card">TV Card</div>
                <div class="card">TV Card</div>
                <div class="card">TV Card</div>
            </div>
        </section>

    </main>

    <script type="module" src="js/main.js"></script>

</body>

</html>
